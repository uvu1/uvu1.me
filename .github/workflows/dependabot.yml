version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '04:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    groups:
      tanstack:
        patterns:
          - '@tanstack/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      cloudflare:
        patterns:
          - '@cloudflare/*'
          - 'wrangler'
      tooling:
        dependency-type: 'development'
        patterns:
          - 'typescript'
          - 'vite'
          - 'vitest'
          - 'eslint'
          - 'prettier'
          - '@vitejs/*'
      markdown:
        patterns:
          - 'remark-*'
          - 'rehype-*'
          - 'unified'
          - 'unist-*'
          - 'shiki'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '04:30'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'github-actions'
