name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Prettier / Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit test
        run: bun run test:run

      - name: Build
        run: bun run build
